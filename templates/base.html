<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Óptica Popayán</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='logo_optica.png') }}" alt="Base de datos Optica Popayán v1.5" height="80" class="me-2">
      <span>Base de datos Optica Popayán v1.2</span>
    </a>
    <div class="ms-auto">
      <span class="text-light me-3">Usuario: {{ session.get('nombre') }}</span>
      <a class="btn btn-light btn-sm" href="{{ url_for('logout') }}">Cerrar sesión</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'success' if cat==None else cat }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
