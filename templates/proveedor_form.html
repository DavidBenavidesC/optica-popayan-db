{% extends 'layout.html' %}
{% block content %}
<h3>{{ accion }} proveedor</h3>

<form method="post" class="mt-3" novalidate>
    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" id="nombre" name="nombre" class="form-control"
               value="{{ proveedor.nombre if proveedor else '' }}" required>
    </div>

    <div class="mb-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" class="form-control"
               pattern="^[0-9]{7,10}$" title="Solo números (7-10 dígitos)"
               value="{{ proveedor.telefono if proveedor else '' }}">
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control"
               value="{{ proveedor.email if proveedor else '' }}">
    </div>

    <div class="mb-3">
        <label for="direccion" class="form-label">Dirección</label>
        <input type="text" id="direccion" name="direccion" class="form-control"
               value="{{ proveedor.direccion if proveedor else '' }}">
    </div>

    <div class="mt-3">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('proveedores') }}" class="btn btn-secondary">Volver</a>
    </div>
</form>
{% endblock %}
