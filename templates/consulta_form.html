{% extends 'layout.html' %}
{% block content %}
<h3>Nueva consulta</h3>

<form method="post" class="mt-4">
  <div class="card mb-4">
    <div class="card-header bg-primary text-white">Datos de la consulta</div>
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="cliente_id" class="form-label">Cliente</label>
          <select name="cliente_id" id="cliente_id" class="form-select" required>
            <option value="">Seleccione un cliente...</option>
            {% for c in clientes %}
              <option value="{{ c.cliente_id }}">{{ c.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label for="precio" class="form-label">Precio</label>
          <input type="number" step="0.01" name="precio" id="precio" class="form-control" value="30000">
        </div>
      </div>

      <div class="mb-3">
        <label for="observaciones" class="form-label">Observaciones</label>
        <textarea name="observaciones" id="observaciones" class="form-control" rows="2"></textarea>
      </div>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-header bg-secondary text-white">Fórmula (opcional)</div>
    <div class="card-body">
      <table class="table table-bordered align-middle text-center">
        <thead class="table-light">
          <tr>
            <th>Ojo</th>
            <th>Esfera</th>
            <th>Cilindro</th>
            <th>Eje</th>
            <th>Add</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Derecho (OD)</strong></td>
            <td><input type="text" name="esfera_od" class="form-control"></td>
            <td><input type="text" name="cilindro_od" class="form-control"></td>
            <td><input type="text" name="eje_od" class="form-control"></td>
            <td><input type="text" name="add_od" class="form-control"></td>
          </tr>
          <tr>
            <td><strong>Izquierdo (OI)</strong></td>
            <td><input type="text" name="esfera_oi" class="form-control"></td>
            <td><input type="text" name="cilindro_oi" class="form-control"></td>
            <td><input type="text" name="eje_oi" class="form-control"></td>
            <td><input type="text" name="add_oi" class="form-control"></td>
          </tr>
        </tbody>
      </table>

      <div class="mb-3">
        <label for="observaciones_receta" class="form-label">Observaciones de la fórmula</label>
        <textarea name="observaciones_receta" id="observaciones_receta" class="form-control" rows="2"></textarea>
      </div>
    </div>
  </div>

  <div class="mt-3">
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{{ url_for('consultas') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
