{% extends 'layout.html' %}
{% block content %}
<h3>{{ accion }} cliente</h3>

<form method="post" class="mt-4">
  <div class="row mb-3">
    <div class="col-md-4">
      <label for="tipo_documento" class="form-label">Tipo de documento</label>
      <select name="tipo_documento" id="tipo_documento" class="form-select" required>
        <option value="">Seleccione...</option>
        <option value="CC" {% if cliente and cliente.tipo_documento == 'CC' %}selected{% endif %}>Cédula</option>
        <option value="TI" {% if cliente and cliente.tipo_documento == 'TI' %}selected{% endif %}>Tarjeta de identidad</option>
        <option value="CE" {% if cliente and cliente.tipo_documento == 'CE' %}selected{% endif %}>Cédula extranjera</option>
      </select>
    </div>

    <div class="col-md-4">
      <label for="numero_documento" class="form-label">Número de documento</label>
      <input type="text"
             name="numero_documento"
             id="numero_documento"
             class="form-control"
             pattern="^[0-9]{6,15}$"
             inputmode="numeric"
             maxlength="15"
             title="Solo dígitos (6 a 15)."
             value="{{ cliente.numero_documento if cliente else '' }}"
             required>
    </div>

    <div class="col-md-4">
      <label for="nombre" class="form-label">Nombre completo</label>
<input type="text"
       name="nombre"
       id="nombre"
       class="form-control"
       pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ0-9 ]{1,60}$"
       maxlength="60"
       title="Solo letras, números y espacios (1-60 caracteres)."
       required
       value="{{ cliente.nombre if cliente else '' }}">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-4">
      <label for="direccion" class="form-label">Dirección</label>
      <input type="text" name="direccion" id="direccion" class="form-control" maxlength="80"
             value="{{ cliente.direccion if cliente else '' }}">
    </div>

    <div class="col-md-4">
      <label for="telefono" class="form-label">Teléfono</label>
      <input type="tel"
             name="telefono"
             id="telefono"
             class="form-control"
             pattern="^[0-9]{7,10}$"
             inputmode="numeric"
             maxlength="10"
             title="Solo dígitos (7 a 10)."
             value="{{ cliente.telefono if cliente else '' }}"
             required>
    </div>

    <div class="col-md-4">
      <label for="email" class="form-label">Correo electrónico</label>
      <input type="email"
             name="email"
             id="email"
             class="form-control"
             maxlength="80"
             title="Ingrese un correo válido"
             value="{{ cliente.email if cliente else '' }}">
    </div>
  </div>

  <div class="mt-3">
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/clientes" class="btn btn-secondary">Volver</a>
  </div>
</form>
{% endblock %}
