{% extends 'layout.html' %}
{% block content %}
<h3>Nueva venta</h3>

<form method="post" class="mt-4">
  <div class="card mb-4">
    <div class="card-header bg-primary text-white">Datos de la venta</div>
    <div class="card-body">
      <div class="mb-3">
        <label for="cliente_id" class="form-label">Cliente</label>
        <select name="cliente_id" id="cliente_id" class="form-select" required>
          <option value="">Seleccione un cliente...</option>
          {% for c in clientes %}
            <option value="{{ c.cliente_id }}">{{ c.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <div id="productos-container">
        <div class="row mb-3 producto-item">
          <div class="col-md-6">
            <label class="form-label">Producto</label>
            <select name="producto_id[]" class="form-select" required>
              <option value="">Seleccione...</option>
              {% for p in productos %}
                <option value="{{ p.producto_id }}">{{ p.nombre }} (Stock: {{ p.stock }}) - ${{ "%.0f"|format(p.precio_venta) }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Cantidad</label>
            <input type="number" name="cantidad[]" class="form-control" value="1" min="1">
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button type="button" class="btn btn-danger w-100 remove-item">Eliminar</button>
          </div>
        </div>
      </div>

      <button type="button" id="add-producto" class="btn btn-secondary mt-2">Agregar otro producto</button>
    </div>
  </div>

  <div class="mt-3">
    <button type="submit" class="btn btn-primary">Registrar venta</button>
    <a href="{{ url_for('ventas') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>

<script>
document.getElementById('add-producto').addEventListener('click', function() {
  const container = document.getElementById('productos-container');
  const firstItem = container.querySelector('.producto-item');
  const newItem = firstItem.cloneNode(true);
  newItem.querySelectorAll('input').forEach(i => i.value = 1);
  newItem.querySelector('select').selectedIndex = 0;
  container.appendChild(newItem);
});

document.addEventListener('click', function(e) {
  if (e.target.classList.contains('remove-item')) {
    const item = e.target.closest('.producto-item');
    const container = document.getElementById('productos-container');
    if (container.children.length > 1) {
      item.remove();
    }
  }
});
</script>
{% endblock %}
